version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout
      POSTGRES_DB: scout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      SCOUT_DATABASE_URL: postgresql://scout:scout@postgres:5432/scout
      SCOUT_CORS_ORIGINS: http://localhost:8081,http://localhost:3000
      SCOUT_ENABLE_BOOTSTRAP: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: scout-ui/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
