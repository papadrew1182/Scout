name: Scout CI

on:
  push:
    branches: [main, "release-*", "release/**"]
  pull_request:
    branches: [main]
  # Manual trigger for the deployed-smoke job. Kept off the push path
  # because prod currently holds a real family's data — running write
  # tests would pollute the ledger. Wire into push when a dedicated
  # smoke-user family is provisioned.
  workflow_dispatch:
    inputs:
      test_files:
        description: "Space-separated Playwright test files"
        required: false
        default: "tests/auth.spec.ts tests/surfaces.spec.ts tests/responsive.spec.ts tests/dev-mode.spec.ts"
      web_url:
        description: "Deployed frontend URL"
        required: false
        default: "https://scout-ui-gamma.vercel.app"
      api_url:
        description: "Deployed backend URL"
        required: false
        default: "https://scout-backend-production-9991.up.railway.app"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scout
          POSTGRES_PASSWORD: scout
          POSTGRES_DB: scout_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scout"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      SCOUT_DATABASE_URL: postgresql://scout:scout@localhost:5432/scout_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m pytest tests/ -v --tb=short

  frontend-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scout-ui/package.json
      - run: cd scout-ui && npm install
      - run: cd scout-ui && npx tsc --noEmit

  arch-check:
    runs-on: ubuntu-latest
    # Blocking as of the 2026-04-21 cleanup: every mutation endpoint
    # now has either actor.require_permission(...) or a `# noqa:
    # public-route` comment with a written justification.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run architecture check
        run: node scripts/architecture-check.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arch-check-report
          path: arch-check-report.json
          retention-days: 30

  smoke-web:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-types]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scout
          POSTGRES_PASSWORD: scout
          POSTGRES_DB: scout
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scout"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      SCOUT_DATABASE_URL: postgresql://scout:scout@localhost:5432/scout
      EXPO_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Migrate + seed
      - run: cd backend && python migrate.py
      - run: cd backend && python seed_smoke.py

      # Start backend
      - run: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      - name: Wait for backend
        run: python scripts/wait_for_url.py http://localhost:8000/health 30

      # Build + serve frontend
      - run: cd scout-ui && npm install
      - run: cd scout-ui && npx expo export --platform web
      - run: cd scout-ui && npx serve dist -s -l tcp://0.0.0.0:8081 &
      - name: Wait for frontend
        run: python scripts/wait_for_url.py http://localhost:8081/ 30

      # Smoke tests
      - run: cd smoke-tests && npm ci
      - run: cd smoke-tests && npx playwright install chromium --with-deps
      - run: cd smoke-tests && npx playwright test
        env:
          SCOUT_WEB_URL: http://localhost:8081

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            smoke-tests/playwright-report/
            smoke-tests/test-results/
          retention-days: 7

  smoke-deployed:
    # Manual-only today; see `workflow_dispatch` block at top. Runs
    # Playwright against the real Vercel + Railway deploy.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SCOUT_WEB_URL: ${{ github.event.inputs.web_url }}
      SCOUT_API_URL: ${{ github.event.inputs.api_url }}
      SMOKE_ADULT_EMAIL: ${{ secrets.SCOUT_SMOKE_ADULT_EMAIL }}
      SMOKE_PASSWORD: ${{ secrets.SCOUT_SMOKE_PASSWORD }}
      SMOKE_CHILD_EMAIL: ${{ secrets.SCOUT_SMOKE_CHILD_EMAIL }}
    steps:
      - name: Verify smoke credentials are configured
        run: |
          if [ -z "$SMOKE_ADULT_EMAIL" ] || [ -z "$SMOKE_PASSWORD" ]; then
            echo "::error::Missing SCOUT_SMOKE_ADULT_EMAIL or SCOUT_SMOKE_PASSWORD secret."
            echo "See docs/release_candidate_report.md > Deployed smoke (manual) for setup."
            exit 1
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd smoke-tests && npm ci
      - run: cd smoke-tests && npx playwright install chromium --with-deps

      - name: Run Playwright against deployed URLs
        run: cd smoke-tests && npx playwright test ${{ github.event.inputs.test_files }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployed-smoke-report
          path: |
            smoke-tests/playwright-report/
            smoke-tests/test-results/
          retention-days: 30
