name: Scout CI

on:
  push:
    branches: [main, "release-*", "release/**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scout
          POSTGRES_PASSWORD: scout
          POSTGRES_DB: scout_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scout"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      SCOUT_DATABASE_URL: postgresql://scout:scout@localhost:5432/scout_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m pytest tests/ -v --tb=short

  frontend-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scout-ui/package.json
      - run: cd scout-ui && npm install
      - run: cd scout-ui && npx tsc --noEmit

  smoke-web:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-types]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scout
          POSTGRES_PASSWORD: scout
          POSTGRES_DB: scout
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U scout"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      SCOUT_DATABASE_URL: postgresql://scout:scout@localhost:5432/scout
      EXPO_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Migrate + seed
      - run: cd backend && python migrate.py
      - run: cd backend && python seed_smoke.py

      # Start backend
      - run: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      - name: Wait for backend
        run: python scripts/wait_for_url.py http://localhost:8000/health 30

      # Build + serve frontend
      - run: cd scout-ui && npm install
      - run: cd scout-ui && npx expo export --platform web
      - run: cd scout-ui && npx serve dist -s -l tcp://0.0.0.0:8081 &
      - name: Wait for frontend
        run: python scripts/wait_for_url.py http://localhost:8081/ 30

      # Smoke tests
      - run: cd smoke-tests && npm ci
      - run: cd smoke-tests && npx playwright install chromium --with-deps
      - run: cd smoke-tests && npx playwright test
        env:
          SCOUT_WEB_URL: http://localhost:8081

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            smoke-tests/playwright-report/
            smoke-tests/test-results/
          retention-days: 7
